<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Modificar Obra</title>
  <link rel="stylesheet" href="styles/style-v2.css">
</head>

<body>

<header class="header-principal">
  <img src="assets/img/logo-empresa.png" alt="Logo">
  <div class="titulo-principal">
    <h1>MODIFICAR OBRA</h1>
    <h2>Aguero Instalaciones</h2>
  </div>
</header>

<div class="panel-admin">
  <div class="form-card">

    <h2 class="form-title">Editar Datos de la Obra</h2>

    <div class="form-grid">

      <div class="form-group">
        <label>Nombre de la obra</label>
        <input type="text" id="nombreObra">
      </div>

      <div class="form-group">
        <label>Nombre corto</label>
        <input type="text" id="nombreCorto">
      </div>

      <div class="form-group">
        <label>Dirección</label>
        <input type="text" id="direccionObra">
      </div>

      <div class="form-group">
        <label>Ciudad</label>
        <input type="text" id="ciudadObra">
      </div>

      <div class="form-group">
        <label>Fecha de inicio</label>
        <input type="date" id="fechaInicio">
      </div>

      <div class="form-group">
        <label>Encargado</label>
        <select id="encargadoObra"></select>
      </div>

      <div class="form-group">
        <label>Horas estimadas</label>
        <input type="number" id="horasObra" min="0">
      </div>

    </div>

    <div class="form-buttons">
      <button onclick="window.location.href='lista_obras.html'" class="btn-secundario">⬅️ Volver</button>
      <button onclick="guardarCambios()" class="btn-primario">💾 Guardar Cambios</button>
    </div>

  </div>
</div>

<script src="scripts/usuarios.js"></script>
<script src="scripts/obras.js"></script>

<script>
// ===============================
//  OBTENER ID DE LA OBRA DESDE LA URL
// ===============================
const params = new URLSearchParams(window.location.search);
const obraID = params.get("id");
let obraActual = null;


// ===============================
//  CARGAR ENCARGADOS
// ===============================
function cargarEncargados(encargadoActual) {
  const select = document.getElementById("encargadoObra");
  select.innerHTML = "";

  const usuarios = JSON.parse(localStorage.getItem("usuariosPCI")) || [];
  const encargados = usuarios.filter(u => u.rol === "Encargado de Obra");

  encargados.forEach(u => {
    const opt = document.createElement("option");
    opt.value = u.id;
    opt.textContent = u.nombre;
    if (u.id === encargadoActual) opt.selected = true;
    select.appendChild(opt);
  });
}


// ===============================
//  CARGAR DATOS DE LA OBRA
// ===============================
document.addEventListener("DOMContentLoaded", () => {
  obraActual = getObraById(obraID);

  if (!obraActual) {
    alert("No se encontró la obra.");
    window.location.href = "lista_obras.html";
    return;
  }

  document.getElementById("nombreObra").value = obraActual.nombre;
  document.getElementById("nombreCorto").value = obraActual.nombreCorto;
  document.getElementById("direccionObra").value = obraActual.direccion || "";
  document.getElementById("ciudadObra").value = obraActual.ciudad || "";
  document.getElementById("fechaInicio").value = obraActual.fechaInicio || "";
  document.getElementById("horasObra").value = obraActual.horasEstimadas || 0;

  cargarEncargados(obraActual.encargado);
});


// ===============================
//  GUARDAR CAMBIOS (BLINDADO)
// ===============================
function guardarCambios() {

  const nombre = document.getElementById("nombreObra").value.trim();
  const nombreCorto = document.getElementById("nombreCorto").value.trim().toLowerCase();
  const direccion = document.getElementById("direccionObra").value.trim();
  const ciudad = document.getElementById("ciudadObra").value.trim();
  const fechaInicio = document.getElementById("fechaInicio").value;
  const encargado = document.getElementById("encargadoObra").value;
  const horas = Number(document.getElementById("horasObra").value);

  if (!nombre) return alert("La obra debe tener un nombre.");
  if (!nombreCorto) return alert("El nombre corto es obligatorio.");
  if (!encargado) return alert("Debes seleccionar un encargado.");

  // Validar nombre corto duplicado
  const obras = listarObras();
  if (obras.some(o => o.nombreCorto === nombreCorto && o.id !== obraID)) {
    alert("El nombre corto ya existe en otra obra.");
    return;
  }

  // Actualizar obra
  obraActual.nombre = nombre;
  obraActual.nombreCorto = nombreCorto;
  obraActual.direccion = direccion;
  obraActual.ciudad = ciudad;
  obraActual.fechaInicio = fechaInicio;
  obraActual.encargado = encargado;
  obraActual.horasEstimadas = horas;

  guardarObra(obraActual);

  alert("Cambios guardados correctamente.");
  window.location.href = "lista_obras.html";
}
</script>

</body>
</html>
