<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Planning Obra Acacias</title>
    <link rel="stylesheet" href="styles/style-v2.css">

    <style>
        body { 
    background: #000000; 
    color: white;
}


        .container {
            max-width: 900px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table th, table td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }

        table th {
            background: #0078d4;
            color: white;
        }

        .btn {
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
        }

        .btn-add { background: #28a745; color: white; }
        .btn-edit { background: #ffc107; }
        .btn-delete { background: #dc3545; color: white; }
        .btn-back { background: #0078d4; color: white; width: 100%; margin-top: 20px; }
   /* Texto negro en el formulario */
label {
    color: black !important;
}

input, select {
    color: black !important;
    background-color: white !important;
}

/* Para que el texto dentro de los inputs sea visible */
input::placeholder {
    color: #444 !important;
}

   
    </style>
</head>

<body>

<div class="container">
    <h2>Planning – Obra Acacias</h2>

    <h3>Crear nueva tarea del planning</h3>

    <label>ID</label>
    <input type="text" id="idPlan" style="width:100%;">

    <label>Nombre de la tarea</label>
    <input type="text" id="nombrePlan" style="width:100%;">

    <label>Duración (días)</label>
    <input type="number" id="duracionPlan" style="width:100%;">

    <label>Fecha inicio</label>
    <input type="date" id="inicioPlan" style="width:100%;">

    <label>Fecha fin</label>
    <input type="date" id="finPlan" style="width:100%;">

    <button class="btn btn-add" onclick="guardarPlanning()">Guardar tarea</button>

    <hr>

    <h3>Tareas del planning</h3>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Tarea</th>
                <th>Duración</th>
                <th>Inicio</th>
                <th>Fin</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tablaPlanning"></tbody>
    </table>

    <button class="btn-back" onclick="window.location.href='index.html'">⬅️ Volver</button>
</div>
