<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Planning Obra Acacias</title>
    <link rel="stylesheet" href="styles/style-v2.css">

    <style>

        /* ============================
           FONDO GENERAL OSCURO
        ============================ */
        body { 
            background: #000000; 
            color: white;
            font-family: Arial, sans-serif;
        }

        /* ============================
           CONTENEDOR BLANCO (FORMULARIO)
        ============================ */
        .container {
            max-width: 900px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            color: black; /* Texto negro sobre fondo blanco */
        }

        /* ============================
           CONTENEDOR OSCURO (PLANNING)
        ============================ */
        .planning-container {
            max-width: 900px;
            margin: 30px auto;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            color: white; /* Texto blanco sobre fondo oscuro */
        }

        .planning-container h2,
        .planning-container h3,
        .planning-container label {
            color: white;
        }

        .planning-container input,
        .planning-container select {
            background-color: #2c2c2c;
            color: white;
            border: 1px solid #555;
        }

        /* ============================
           TABLA DEL PLANNING
        ============================ */
        .planning-container table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .planning-container th,
        .planning-container td {
            padding: 10px;
            text-align: center;
            border: 1px solid #444;
            color: white;
        }

        .planning-container th {
            background-color: #333;
        }

        .planning-container td {
            background-color: #2a2a2a;
        }

        /* ============================
           BOTONES
        ============================ */
        .btn {
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
        }

        .btn-add { background: #28a745; color: white; }
        .btn-edit { background: #ffc107; color: black; }
        .btn-delete { background: #dc3545; color: white; }
        .btn-back { background: #0078d4; color: white; width: 100%; margin-top: 20px; }

    </style>
</head>

<body>

<!-- ============================
     BLOQUE OSCURO DEL PLANNING
============================ -->
<div class="planning-container">
    <h2>Planning – Obra Acacias</h2>

    <h3>Crear nueva tarea del planning</h3>

    <label>ID</label>
    <input type="text" id="idPlan">

    <label>Nombre de la tarea</label>
    <input type="text" id="nombrePlan">

    <label>Duración (días)</label>
    <input type="number" id="duracionPlan">

    <label>Fecha inicio</label>
    <input type="date" id="inicioPlan">

    <label>Fecha fin</label>
    <input type="date" id="finPlan">

    <button class="btn btn-add" onclick="guardarPlanning()">Guardar tarea</button>

    <hr>

    <h3>Tareas del planning</h3>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Tarea</th>
                <th>Duración</th>
                <th>Inicio</th>
                <th>Fin</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tablaPlanning"></tbody>
    </table>

    <button class="btn-back" onclick="window.location.href='index.html'">⬅️ Volver</button>
</div>

<!-- 🔥 SIN FIREBASE (porque trabajas en local) -->
<script src="scripts/planning_acacias.js"></script>

</body>
</html>
