<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Tarea</title>
    <link rel="stylesheet" href="styles/style-v2.css">

    <style>
        .form-card {
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .form-card h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        .form-card label {
            font-weight: bold;
            margin-top: 10px;
            display: block;
        }
        .form-card input, .form-card textarea, .form-card select {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        .btn-guardar {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-volver {
            width: 100%;
            margin-top: 10px;
            padding: 12px;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        /* Modal plano */
        #modalPlano {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
        }
        #modalPlano img {
            max-width: 90%;
            max-height: 90%;
            border: 4px solid white;
            border-radius: 10px;
            cursor: crosshair;
        }

     .subtareas-container {
    margin-top: 20px;
    padding: 12px 15px;
    background: #f4f4f4;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.subtarea-row {
    display: grid;
    grid-template-columns: 22px 22px auto; /* checkbox aplica, checkbox completado, texto */
    align-items: center;
    gap: 6px;
    padding: 4px 0;
    border-bottom: 1px solid #e0e0e0;
}

.subtarea-row:last-child {
    border-bottom: none;
}

.subtarea-row input[type="checkbox"] {
    transform: scale(0.9);
    cursor: pointer;
}

.subtarea-row label {
    font-size: 14px;
    cursor: pointer;
    margin: 0;
}
     </style>
</head>

<body>
<header style="
    background:#0056a3;
    padding:15px;
    color:white;
    display:flex;
    align-items:center;
">
    <img src="assets/img/logo-empresa.png" alt="Agüero Instalaciones" style="height:45px; margin-right:15px;">

    <div>
        <h1 style="margin:0; font-size:22px;">CREAR TAREA</h1>
        <p style="margin:0; font-size:14px; opacity:0.9;">Aguero Instalaciones</p>
        <p style="margin:0; font-size:12px; opacity:0.7;">v5.0.0 — César Augusto</p>
    </div>
</header>

<div class="form-card">
    <h2>Crear Nueva Tarea</h2>

    <!-- SELECTOR DE TAREA DEL PLANNING -->
    <label>Tarea del planning (opcional)</label>
    <select id="selectPlanning" onchange="cargarDatosPlanning()">
        <option value="">-- Crear tarea manual --</option>
    </select>

    <label>Título de la tarea</label>
    <input type="text" id="tituloTarea">

    <label>Descripción</label>
    <textarea id="descripcionTarea" rows="4"></textarea>

    <label>Fecha de inicio</label>
    <input type="date" id="fechaInicioTarea">

    <label>Obra</label>
    <select id="selectObra"></select>

    <label>Planta</label>
    <select id="selectPlanta"></select>

    <label>Plano</label>
    <select id="selectPlano"></select>

    <button class="btn-guardar" onclick="abrirModalPlano()">Seleccionar ubicación en plano</button>

    <label>Asignada a</label>
    <select id="selectUsuarioAsignado"></select>

    <label>Estado inicial</label>
    <select id="estadoTarea">
        <option value="pendiente">Pendiente</option>
        <option value="proceso">En proceso</option>
        <option value="bloqueada">Bloqueada</option>
        <option value="completada">Completada</option>
    </select>

    <label>Prioridad</label>
    <select id="prioridadTarea">
        <option value="alta">Alta</option>
        <option value="media">Media</option>
        <option value="baja" selected>Baja</option>
    </select>

    <!-- SUBTAREAS -->
    <div class="subtareas-container">
        <h3>Subtareas</h3>
        <p>Marca qué subtareas aplican a esta tarea.</p>
        <div id="listaSubtareas"></div>
    </div>

    <button class="btn-guardar" onclick="guardarTarea()">Guardar Tarea</button>
    <button class="btn-volver" onclick="window.location.href='dashboard.html'">⬅️ Volver</button>
</div>

<!-- MODAL PARA SELECCIONAR POSICIÓN -->
<div id="modalPlano">
    <img id="imgPlanoSeleccion" src="">
</div>

<script src="scripts/usuarios.js"></script>
<script src="scripts/obras.js"></script>
<script src="scripts/tareas.js"></script>

<script>
let posX = null;
let posY = null;
let idPlanningSeleccionado = null;

/* ============================================================
   LISTA GENERAL DE SUBTAREAS
============================================================ */
const subtareasGenerales = [
  { nombre: "Instalación de tubo" },
  { nombre: "Fijación y soportes" },
  { nombre: "Sellado de pasos" },
  { nombre: "Revisión de canalización" },

  { nombre: "Pasar cable" },
  { nombre: "Etiquetado de cable" },
  { nombre: "Medición de continuidad" },
  { nombre: "Medición de aislamiento" },

  { nombre: "Instalación de cajas" },
  { nombre: "Nivelación de cajas" },
  { nombre: "Preparación para módulos" },

  { nombre: "Montaje de base" },
  { nombre: "Montaje de módulo/detector" },
  { nombre: "Tornillería" },
  { nombre: "Etiquetado de módulo" },

  { nombre: "Cableado a compuertas cortafuegos" },
  { nombre: "Cableado a retenedores" },
  { nombre: "Cableado a modulos y relés" },
  { nombre: "Cableado a central" },

  { nombre: "Cableado manguera 24V positivo" },
  { nombre: "Cableado manguera 230v a fuente" },
  { nombre: "Cableado manguera 230v a centrales" },
  { nombre: "Protección 24V" },
  { nombre: "Etiquetado 24V" },

  { nombre: "Cableado a retenedor" },
  { nombre: "Conexión de retenedor" },
  { nombre: "Prueba de retención" },

  { nombre: "Empalmes" },
  { nombre: "Bornes" },
  { nombre: "Prueba de tensión" },
  { nombre: "Prueba de continuidad" },

  { nombre: "Prueba de lazo" },
  { nombre: "Prueba de módulo" },
  { nombre: "Prueba de señal técnica" },
  { nombre: "Prueba de compuerta" }
];

/* ============================================================
   CARGAR SUBTAREAS EN FORMULARIO
============================================================ */
function cargarSubtareas() {
    const cont = document.getElementById("listaSubtareas");
    cont.innerHTML = "";

    subtareasGenerales.forEach((sub, i) => {
        const row = document.createElement("div");
        row.className = "subtarea-row";

        row.innerHTML = `
            <input type="checkbox" class="aplica" data-index="${i}">
            <input type="checkbox" class="completado" data-index="${i}" disabled>
            <label>${sub.nombre}</label>
        `;

        cont.appendChild(row);
    });

    activarLogicaCheckbox();
}

/* ============================================================
   LÓGICA APLICA / COMPLETADO
============================================================ */
function activarLogicaCheckbox() {
    const aplica = document.querySelectorAll(".aplica");
    const completado = document.querySelectorAll(".completado");

    aplica.forEach((chk, i) => {
        chk.addEventListener("change", () => {
            const comp = completado[i];
            if (chk.checked) {
                comp.disabled = false;
            } else {
                comp.checked = false;
                comp.disabled = true;
            }
        });
    });
}
/* ============================================================
   CARGAR PLANNING DESDE ARCHIVOS JSON (ACACIAS + DETNOV)
   Y GUARDARLOS EN LOCALSTORAGE COMO planningPCI
============================================================ */
async function cargarPlanningDesdeArchivos() {
    try {
        const acacias = await fetch("./data/planning_acacias.json").then(r => r.json());
        const detnov = await fetch("./data/planning_acacias_detnov.json").then(r => r.json());

        // Unir ambos plannings
        const planningUnificado = [...acacias, ...detnov];

        // Guardar en localStorage para que tu código actual funcione igual
        localStorage.setItem("planningPCI", JSON.stringify(planningUnificado));

        console.log("Planning cargado y guardado en localStorage:", planningUnificado);

    } catch (err) {
        console.error("Error cargando plannings:", err);
    }
}

/* ============================================================
   CARGAR TAREAS DEL PLANNING
============================================================ */
function cargarPlanningEnFormulario() {
    const planning = JSON.parse(localStorage.getItem("planningPCI")) || [];
    const select = document.getElementById("selectPlanning");

    planning.forEach(p => {
        const opt = document.createElement("option");
        opt.value = p.id;
        opt.textContent = `${p.id} – ${p.nombre_tarea}`;
        select.appendChild(opt);
    });
}

/* ============================================================
   AUTOCOMPLETAR DESDE PLANNING
============================================================ */
function cargarDatosPlanning() {
    const id = document.getElementById("selectPlanning").value;
    if (!id) {
        idPlanningSeleccionado = null;
        return;
    }

    const planning = JSON.parse(localStorage.getItem("planningPCI")) || [];
    const p = planning.find(x => x.id === id);
    if (!p) return;

    idPlanningSeleccionado = p.id;

    document.getElementById("tituloTarea").value = p.nombre_tarea;
    document.getElementById("fechaInicioTarea").value = p.fecha_inicio;

    if (!document.getElementById("descripcionTarea").value.trim()) {
        document.getElementById("descripcionTarea").value = `Tarea basada en planning: ${p.nombre_tarea}`;
    }
}

/* ============================================================
   CARGAR OBRAS
============================================================ */
function cargarObras() {
    const obras = JSON.parse(localStorage.getItem("obrasPCI")) || [];
    const select = document.getElementById("selectObra");

    select.innerHTML = `<option value="">Seleccione una obra</option>`;

    obras.forEach(o => {
        const opt = document.createElement("option");
        opt.value = o.id;
        opt.textContent = o.nombre;
        select.appendChild(opt);
    });
}

/* ============================================================
   CARGAR PLANTAS
============================================================ */
function cargarPlantas() {
    const obraId = document.getElementById("selectObra").value;
    const obras = JSON.parse(localStorage.getItem("obrasPCI")) || [];
    const obra = obras.find(o => o.id === obraId);

    const select = document.getElementById("selectPlanta");
    select.innerHTML = "";

    if (!obra) return;

    obra.plantas.forEach(p => {
        const opt = document.createElement("option");
        opt.value = p.id;
        opt.textContent = p.nombre;
        select.appendChild(opt);
    });

    cargarPlanos();
}

/* ============================================================
   CARGAR PLANOS
============================================================ */
function cargarPlanos() {
    const obraId = document.getElementById("selectObra").value;
    const plantaId = document.getElementById("selectPlanta").value;

    const obras = JSON.parse(localStorage.getItem("obrasPCI")) || [];
    const obra = obras.find(o => o.id === obraId);
    const planta = obra?.plantas.find(p => p.id === plantaId);

    const select = document.getElementById("selectPlano");
    select.innerHTML = "";

    if (!planta || !planta.planos) return;

    planta.planos.forEach(pl => {
        const opt = document.createElement("option");
        opt.value = pl.id;
        opt.textContent = `${pl.disciplina} (${pl.id})`;
        select.appendChild(opt);
    });
}

/* ============================================================
   MODAL PLANO
============================================================ */
function abrirModalPlano() {
    const obraId = document.getElementById("selectObra").value;
    const plantaId = document.getElementById("selectPlanta").value;
    const planoId = document.getElementById("selectPlano").value;

    if (!obraId || !plantaId || !planoId) {
        alert("Debe seleccionar obra, planta y plano.");
        return;
    }

    const obras = JSON.parse(localStorage.getItem("obrasPCI")) || [];
    const obra = obras.find(o => o.id === obraId);
    const planta = obra.plantas.find(p => p.id === plantaId);
    const plano = planta.planos.find(pl => pl.id === planoId);

    const modal = document.getElementById("modalPlano");
    const img = document.getElementById("imgPlanoSeleccion");

    img.src = plano.imagen;
    modal.style.display = "flex";

    img.onclick = function(e) {
        const rect = img.getBoundingClientRect();
        posX = (e.clientX - rect.left) / rect.width;
        posY = (e.clientY - rect.top) / rect.height;

        alert("Ubicación seleccionada correctamente.");
        modal.style.display = "none";
    };
}

/* ============================================================
   CARGAR USUARIOS
============================================================ */
function cargarUsuariosAsignables() {
    const usuarios = usuariosData;
    const select = document.getElementById("selectUsuarioAsignado");

    select.innerHTML = "";

    usuarios.forEach(u => {
        const option = document.createElement("option");
        option.value = u.id;
        option.textContent = u.nombre;
        select.appendChild(option);
    });

    const actual = getUsuarioActual();
    if (actual) select.value = actual.id;
}

/* ============================================================
   GUARDAR TAREA
============================================================ */
function guardarTarea() {
    const titulo = document.getElementById("tituloTarea").value.trim();
    const descripcion = document.getElementById("descripcionTarea").value.trim();
    const fechaInicio = document.getElementById("fechaInicioTarea").value;
    const obraId = document.getElementById("selectObra").value;
    const plantaId = document.getElementById("selectPlanta").value;
    const planoId = document.getElementById("selectPlano").value;
    const asignadoA = document.getElementById("selectUsuarioAsignado").value;
    const estado = document.getElementById("estadoTarea").value;
    const prioridad = document.getElementById("prioridadTarea").value;

    if (!titulo || !descripcion) {
        alert("El título y la descripción son obligatorios.");
        return;
    }

    if (!obraId || !plantaId || !planoId) {
        alert("Debe seleccionar obra, planta y plano.");
        return;
    }

    if (posX === null || posY === null) {
        alert("Debe seleccionar una ubicación en el plano.");
        return;
    }

    /* CAPTURAR SUBTAREAS */
    const aplica = document.querySelectorAll(".aplica");
    const completado = document.querySelectorAll(".completado");

    const subtareasFinal = subtareasGenerales.map((sub, i) => ({
        nombre: sub.nombre,
        aplica: aplica[i].checked,
        completado: completado[i].checked
    }));

    const creador = getUsuarioActual();

    crearTarea({
        titulo,
        descripcion,
        obraId,
        plantaId,
        planoId,
        posX,
        posY,
        asignadoA,
        estado,
        prioridad,
        creadoPor: creador.id,
        fechaInicio,
        id_planning: idPlanningSeleccionado,
        subtareas: subtareasFinal
    });

    alert("Tarea creada correctamente.");
    window.location.href = "dashboard.html";
}

/* ============================================================
   INICIALIZACIÓN
============================================================ */
document.addEventListener("DOMContentLoaded", () => {
    cargarObras();
    cargarUsuariosAsignables();
    cargarSubtareas();

    const params = new URLSearchParams(window.location.search);
    const obraId = params.get("obra");

    if (obraId) {
        document.getElementById("selectObra").value = obraId;
        cargarPlantas();

        const plantas = document.getElementById("selectPlanta");
        if (plantas.options.length > 0) {
            plantas.selectedIndex = 0;
            cargarPlanos();

            const planos = document.getElementById("selectPlano");
            if (planos.options.length > 0) {
                planos.selectedIndex = 0;
            }
        }
    }

    document.getElementById("selectObra").addEventListener("change", cargarPlantas);
    document.getElementById("selectPlanta").addEventListener("change", cargarPlanos);
});
cargarPlanningDesdeArchivos().then(() => {
    cargarPlanningEnFormulario();
});

</script>

</body>
</html>
