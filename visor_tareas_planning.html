<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visor de Tareas - Planning Acacias</title>
    <link rel="stylesheet" href="styles/style-v2.css">

    <style>
        body {
            background:#f4f4f4 !important;
            color:#000 !important;
            font-family: "Segoe UI", sans-serif;
        }

        h1 {
            color:#0033A0;
        }

        .kanban-container {
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:20px;
            padding:20px;
        }

        .kanban-column {
            background:white;
            padding:15px;
            border-radius:10px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
            min-height:400px;
        }

        .tarea-card {
            background:#e9e9e9;
            padding:10px;
            margin-bottom:10px;
            border-radius:8px;
            border-left:5px solid #0078d4;
            cursor:grab;
        }

        .volver-btn {
            margin:20px auto;
            display:block;
            width:200px;
            padding:12px;
            background:#0078d4;
            color:white !important;
            border:none;
            border-radius:6px;
            cursor:pointer;
        }

        select {
            padding:6px;
            border-radius:6px;
            border:1px solid #aaa;
            margin-left:6px;
        }
    </style>
</head>

<body>

<h1 style="text-align:center; margin-top:20px;">📅 Planning Acacias</h1>
<h1 style="text-align:center; margin-top:10px;">Visor de Tareas</h1>

<!-- FILTROS -->
<div style="text-align:center; margin-bottom:20px;">
    <label><strong>Mes:</strong></label>
    <select id="filtroMes" onchange="renderKanban()">
        <option value="0">Enero</option><option value="1">Febrero</option>
        <option value="2">Marzo</option><option value="3">Abril</option>
        <option value="4">Mayo</option><option value="5">Junio</option>
        <option value="6">Julio</option><option value="7">Agosto</option>
        <option value="8">Septiembre</option><option value="9">Octubre</option>
        <option value="10">Noviembre</option><option value="11">Diciembre</option>
    </select>

    <label><strong>Año:</strong></label>
    <select id="filtroAño" onchange="renderKanban()"></select>
</div>

<div style="text-align:center; margin-bottom:20px;">
    <label><strong>Filtrar por obra:</strong></label>
    <select id="filtroObra" onchange="renderKanban()">
        <option value="todas">Todas las obras</option>
    </select>
</div>

<div style="text-align:center; margin-bottom:20px;">
    <label><strong>Filtrar por usuario:</strong></label>
    <select id="filtroUsuario" onchange="renderKanban()">
        <option value="todos">Todos los usuarios</option>
    </select>
</div>

<!-- KANBAN -->
<div class="kanban-container">
    <div class="kanban-column" id="bloqueada" ondragover="allowDrop(event)" ondrop="drop(event,'bloqueada')">
        <h2 id="titulo-bloqueada">🟥 Bloqueadas (0)</h2>
    </div>

    <div class="kanban-column" id="proceso" ondragover="allowDrop(event)" ondrop="drop(event,'proceso')">
        <h2 id="titulo-proceso">🟦 En proceso (0)</h2>
    </div>

    <div class="kanban-column" id="pendiente" ondragover="allowDrop(event)" ondrop="drop(event,'pendiente')">
        <h2 id="titulo-pendiente">🟨 Pendientes (0)</h2>
    </div>

    <div class="kanban-column" id="completada" ondragover="allowDrop(event)" ondrop="drop(event,'completada')">
        <h2 id="titulo-completada">🟩 Completadas (0)</h2>
    </div>
</div>

<button class="volver-btn" onclick="window.location.href='dashboard.html'">⬅️ Volver</button>

<script>
// ===============================
//  VISOR TAREAS PLANNING (LOCALSTORAGE)
// ===============================

document.addEventListener("DOMContentLoaded", () => {
    cargarAnios();
    cargarObras();
    cargarUsuarios();
    renderKanban();
});

// Cargar selector de años
function cargarAnios() {
    const sel = document.getElementById("filtroAño");
    sel.innerHTML = "";
    const añoActual = new Date().getFullYear();

    for (let y = añoActual - 2; y <= añoActual + 4; y++) {
        const opt = document.createElement("option");
        opt.value = y;
        opt.textContent = y;
        if (y === añoActual) opt.selected = true;
        sel.appendChild(opt);
    }
}

// Cargar obras
function cargarObras() {
    const obras = JSON.parse(localStorage.getItem("obrasPCI")) || [];
    const sel = document.getElementById("filtroObra");

    obras.forEach(o => {
        const opt = document.createElement("option");
        opt.value = o.id;
        opt.textContent = o.nombre;
        sel.appendChild(opt);
    });
}

// Cargar usuarios
function cargarUsuarios() {
    const usuarios = JSON.parse(localStorage.getItem("usuariosPCI")) || [];
    const sel = document.getElementById("filtroUsuario");

    usuarios.forEach(u => {
        const opt = document.createElement("option");
        opt.value = u.id;
        opt.textContent = u.nombre;
        sel.appendChild(opt);
    });
}

// Renderizar Kanban
function renderKanban() {
    const mes = parseInt(document.getElementById("filtroMes").value);
    const año = parseInt(document.getElementById("filtroAño").value);
    const obraFiltro = document.getElementById("filtroObra").value;
    const usuarioFiltro = document.getElementById("filtroUsuario").value;

    const tareas = JSON.parse(localStorage.getItem("tareasPCI")) || [];
    const planning = JSON.parse(localStorage.getItem("planningPCI")) || [];

    ["bloqueada", "proceso", "pendiente", "completada"].forEach(id => {
        document.getElementById(id).innerHTML = `<h2 id="titulo-${id}">${document.getElementById(`titulo-${id}`).textContent}</h2>`;
    });

    let cont = { bloqueada:0, proceso:0, pendiente:0, completada:0 };

    tareas.forEach(t => {
        const fecha = new Date(t.fechaInicio);
        if (fecha.getMonth() !== mes || fecha.getFullYear() !== año) return;

        if (obraFiltro !== "todas" && t.obraId !== obraFiltro) return;
        if (usuarioFiltro !== "todos" && t.asignadoA !== usuarioFiltro) return;

        const card = document.createElement("div");
        card.className = "tarea-card";
        card.draggable = true;
        card.id = t.id;
        card.ondragstart = e => e.dataTransfer.setData("text", t.id);

    // Buscar planning asociado
const plan = planning.find(p => p.id === t.id_planning);

// ===============================
// ASEGURAR SUBTAREAS
// ===============================
if (!t.subtareas) {
    t.subtareas = [];
}

// ===============================
// SUBTAREAS COMPLETADAS (solo las que aplican)
// ===============================
let subtareasHTML = "";

try {
    let subs = t.subtareas;

    if (typeof subs === "string") subs = JSON.parse(subs);
    if (!Array.isArray(subs)) subs = [];

    const completadas = subs.filter(s =>
        (s.aplica === true || s.aplica === "true") &&
        (s.completado === true || s.completado === "true" ||
         s.completada === true || s.completada === "true")
    );

   if (completadas.length > 0) {
    subtareasHTML = "<br><strong>Subtareas completadas:</strong><br>";
    completadas.forEach(s => {
        subtareasHTML += `✔ ${s.nombre}<br>`;
    });
}

} catch (e) {
    console.warn("Error procesando subtareas:", e);
}

// ===============================
// ESTADO PLAZO
// ===============================
let estadoPlazo = "";
if (t.resultado_plazo === "en_plazo") estadoPlazo = `<span style="color:green;font-weight:bold;">🟢 En plazo</span>`;
if (t.resultado_plazo === "fuera_de_plazo") estadoPlazo = `<span style="color:red;font-weight:bold;">🔴 Fuera de plazo</span>`;

// ===============================
// TARJETA KANBAN
// ===============================
card.innerHTML = `
    <strong>${t.titulo}</strong><br>
    Obra: ${t.obraId}<br>
    Asignada a: ${t.asignadoA}<br>
    Inicio: ${t.fechaInicio}<br>
    Fin real: ${t.fechaFin || "-"}<br>
    ${estadoPlazo}
    ${subtareasHTML}
`;

const estado = t.estado || "pendiente";
document.getElementById(estado).appendChild(card);
cont[estado]++;

});

// Contadores
document.getElementById("titulo-bloqueada").textContent = `🟥 Bloqueadas (${cont.bloqueada})`;
document.getElementById("titulo-proceso").textContent = `🟦 En proceso (${cont.proceso})`;
document.getElementById("titulo-pendiente").textContent = `🟨 Pendientes (${cont.pendiente})`;
document.getElementById("titulo-completada").textContent = `🟩 Completadas (${cont.completada})`;
}


// Drag & Drop
function allowDrop(ev) { ev.preventDefault(); }

function drop(ev, estadoNuevo) {
    ev.preventDefault();
    const id = ev.dataTransfer.getData("text");

    let tareas = JSON.parse(localStorage.getItem("tareasPCI")) || [];
    let planning = JSON.parse(localStorage.getItem("planningPCI")) || [];

    const tarea = tareas.find(t => t.id === id);
    if (!tarea) return;

    // ============================
    // NORMALIZAR SUBTAREAS
    // ============================
    try {
        if (!tarea.subtareas) {
            tarea.subtareas = [];
        } else if (typeof tarea.subtareas === "string") {
            tarea.subtareas = JSON.parse(tarea.subtareas);
        } else if (!Array.isArray(tarea.subtareas)) {
            tarea.subtareas = JSON.parse(JSON.stringify(tarea.subtareas));
        }
    } catch {
        tarea.subtareas = [];
    }

    // ============================
    // VALIDAR SUBTAREAS ANTES DE COMPLETAR
    // ============================
    if (estadoNuevo === "completada") {
        const pendientes = Array.isArray(tarea.subtareas) &&
            tarea.subtareas.some(s =>
                (s.aplica === true || s.aplica === "true") &&
                !(s.completado === true || s.completado === "true" || s.completada === true || s.completada === "true")
            );

        if (pendientes) {
            alert("No puedes completar esta tarea porque tiene subtareas pendientes.");
            return;
        }
    }

    // Guardar fecha final si se completa
    let fechaFin = null;
    if (estadoNuevo === "completada") {
        fechaFin = new Date().toISOString().split("T")[0];
        tarea.fechaFin = fechaFin;
    }

    // Comparar con planning
    const plan = planning.find(p => p.id === tarea.id_planning);
    if (plan && fechaFin) {
        const inicioPlan = new Date(plan.fecha_inicio);
        const finPlan = new Date(plan.fecha_fin);
        const inicioReal = new Date(tarea.fechaInicio);
        const finReal = new Date(fechaFin);

        if (inicioReal > inicioPlan || finReal > finPlan) {
            tarea.resultado_plazo = "fuera_de_plazo";
        } else {
            tarea.resultado_plazo = "en_plazo";
        }
    }

    tarea.estado = estadoNuevo;

    localStorage.setItem("tareasPCI", JSON.stringify(tareas));
    renderKanban();
}
</script>

</body>
</html>
