<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visor de Tareas</title>
    <link rel="stylesheet" href="styles/style-v2.css">

    <style>
        body {
            background: #f4f4f4;
        }

        .kanban-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding: 20px;
        }

        .kanban-column {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            min-height: 400px;
        }

        .kanban-column h2 {
            text-align: center;
            margin-bottom: 15px;
        }

        .tarea-card {
            background: #e9e9e9;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 5px solid #0078d4;
            cursor: grab;
            transition: transform 0.2s;
        }

        .tarea-card:active {
            cursor: grabbing;
            transform: scale(1.03);
        }

        .volver-btn {
            margin: 20px auto;
            display: block;
            width: 200px;
            padding: 12px;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
        }
    </style>
</head>

<body>
<header style="
    background:#0056a3;
    padding:15px;
    color:white;
    display:flex;
    align-items:center;
">
    <img src="assets/img/logo-empresa.png" alt="Agüero Instalaciones" style="height:45px; margin-right:15px;">
    <div>
        <h1 style="margin:0; font-size:22px;">VISOR TAREAS</h1>
        <p style="margin:0; font-size:14px; opacity:0.9;">Aguero Instalaciones</p>
        <p style="margin:0; font-size:12px; opacity:0.7;">v5.0.0 — César Augusto</p>
    </div>
</header>

<h1 style="text-align:center; margin-top:20px;">Visor de Tareas</h1>

<!-- FILTROS -->
<div style="text-align:center; margin-bottom:20px;">
    <label><strong>Mes:</strong></label>
    <select id="filtroMes" onchange="renderKanban()">
        <option value="0">Enero</option><option value="1">Febrero</option>
        <option value="2">Marzo</option><option value="3">Abril</option>
        <option value="4">Mayo</option><option value="5">Junio</option>
        <option value="6">Julio</option><option value="7">Agosto</option>
        <option value="8">Septiembre</option><option value="9">Octubre</option>
        <option value="10">Noviembre</option><option value="11">Diciembre</option>
    </select>

    <label><strong>Año:</strong></label>
    <select id="filtroAño" onchange="renderKanban()"></select>
</div>

<div style="text-align:center; margin-bottom:20px;">
    <label><strong>Filtrar por obra:</strong></label>
    <select id="filtroObra" onchange="renderKanban()">
        <option value="todas">Todas las obras</option>
    </select>
</div>

<div style="text-align:center; margin-bottom:20px;">
    <label><strong>Filtrar por usuario:</strong></label>
    <select id="filtroUsuario" onchange="renderKanban()">
        <option value="todos">Todos los usuarios</option>
    </select>
</div>

<!-- KANBAN -->
<div class="kanban-container">
    <div class="kanban-column" id="bloqueada" ondragover="allowDrop(event)" ondrop="drop(event, 'bloqueada')">
       <h2 id="titulo-bloqueada">🟥 Bloqueadas (0)</h2> 
    </div>

    <div class="kanban-column" id="proceso" ondragover="allowDrop(event)" ondrop="drop(event, 'proceso')">
        <h2 id="titulo-proceso">🟦 En proceso (0)</h2>
    </div>

    <div class="kanban-column" id="pendiente" ondragover="allowDrop(event)" ondrop="drop(event, 'pendiente')">
        <h2 id="titulo-pendiente">🟨 Pendientes (0)</h2>
    </div>

    <div class="kanban-column" id="completada" ondragover="allowDrop(event)" ondrop="drop(event, 'completada')">
        <h2 id="titulo-completada">🟩 Completadas (0)</h2>
    </div>
</div>

<button class="volver-btn" onclick="window.location.href='dashboard.html'">⬅️ Volver</button>

<script src="scripts/tareas.js"></script>
<script src="scripts/obras.js"></script>
<script src="scripts/usuarios.js"></script>

<script>
let tareas = [];
let planning = [];
let usuarios = [];

// ===============================
// INICIALIZACIÓN
// ===============================
document.addEventListener("DOMContentLoaded", () => {
    tareas = JSON.parse(localStorage.getItem("tareasPCI")) || [];
    planning = JSON.parse(localStorage.getItem("planningPCI")) || [];
    usuarios = JSON.parse(localStorage.getItem("usuariosPCI")) || [];

    cargarObrasEnFiltro();
    cargarUsuariosEnFiltro();
    cargarAños();

    document.getElementById("filtroMes").value = new Date().getMonth();

    renderKanban();
});

// ===============================
// CARGAR AÑOS
// ===============================
function cargarAños() {
    const sel = document.getElementById("filtroAño");
    sel.innerHTML = "";

    const añoActual = new Date().getFullYear();

    for (let a = añoActual - 3; a <= añoActual + 3; a++) {
        const opt = document.createElement("option");
        opt.value = a;
        opt.textContent = a;
        sel.appendChild(opt);
    }

    sel.value = añoActual;
}

// ===============================
// RENDERIZAR KANBAN
// ===============================
function renderKanban() {
    const mesSel = parseInt(document.getElementById("filtroMes").value);
    const añoSel = parseInt(document.getElementById("filtroAño").value);
    const obraSel = document.getElementById("filtroObra").value;
    const usuarioSel = document.getElementById("filtroUsuario").value;

    let lista = [...tareas];

    // FILTRO MES/AÑO
    lista = lista.filter(t => {
        if (!t.fechaInicio) return false;
        const f = new Date(t.fechaInicio);
        return f.getMonth() === mesSel && f.getFullYear() === añoSel;
    });

    // FILTRO OBRA
    if (obraSel !== "todas") {
        lista = lista.filter(t => t.obraId === obraSel);
    }

    // FILTRO USUARIO
    if (usuarioSel !== "todos") {
        lista = lista.filter(t => t.asignadoA === usuarioSel);
    }

    // LIMPIAR COLUMNAS
    document.querySelectorAll(".kanban-column").forEach(col => {
        col.querySelectorAll(".tarea-card").forEach(card => card.remove());
    });

    let count = { bloqueada: 0, proceso: 0, pendiente: 0, completada: 0 };

    lista.forEach(t => {
        const card = document.createElement("div");
        card.className = "tarea-card";
        card.draggable = true;
        card.id = t.id;
        card.ondragstart = drag;

        // Buscar planning asociado
        const plan = planning.find(p => p.id === t.id_planning);

        let estadoPlazo = "";
        if (t.resultado_plazo === "en_plazo") estadoPlazo = `<span style="color:green;font-weight:bold;">🟢 En plazo</span>`;
        if (t.resultado_plazo === "fuera_de_plazo") estadoPlazo = `<span style="color:red;font-weight:bold;">🔴 Fuera de plazo</span>`;

        card.innerHTML = `
            <strong>${t.titulo}</strong><br>
            Obra: ${getObraById(t.obraId)?.nombre || "-"}<br>
            Asignada a: ${getUsuarioById(t.asignadoA)?.nombre || "-"}<br>
            Inicio: ${t.fechaInicio}<br>
            Fin real: ${t.fechaFin || "-"}<br>
            ${estadoPlazo}
        `;

        document.getElementById(t.estado).appendChild(card);
        count[t.estado]++;
    });

    document.getElementById("titulo-bloqueada").textContent = `🟥 Bloqueadas (${count.bloqueada})`;
    document.getElementById("titulo-proceso").textContent = `🟦 En proceso (${count.proceso})`;
    document.getElementById("titulo-pendiente").textContent = `🟨 Pendientes (${count.pendiente})`;
    document.getElementById("titulo-completada").textContent = `🟩 Completadas (${count.completada})`;
}

// ===============================
// DRAG & DROP
// ===============================
function drag(event) {
    event.dataTransfer.setData("text", event.target.id);
}

function allowDrop(event) {
    event.preventDefault();
}

function drop(event, nuevoEstado) {
    event.preventDefault();
    const idTarea = event.dataTransfer.getData("text");

    const tarea = tareas.find(t => t.id === idTarea);
    if (!tarea) return;

    // Guardar fecha final si se completa
    if (nuevoEstado === "completada") {
        tarea.fechaFin = new Date().toISOString().split("T")[0];
    }

    // Comparar con planning
    const plan = planning.find(p => p.id === tarea.id_planning);
    if (plan && tarea.fechaFin) {
        const inicioPlan = new Date(plan.fecha_inicio);
        const finPlan = new Date(plan.fecha_fin);
        const inicioReal = new Date(tarea.fechaInicio);
        const finReal = new Date(tarea.fechaFin);

        if (inicioReal > inicioPlan || finReal > finPlan) {
            tarea.resultado_plazo = "fuera_de_plazo";
        } else {
            tarea.resultado_plazo = "en_plazo";
        }
    }

    tarea.estado = nuevoEstado;

    localStorage.setItem("tareasPCI", JSON.stringify(tareas));

    renderKanban();
}

// ===============================
// UTILIDADES
// ===============================
function cargarObrasEnFiltro() {
    const obras = JSON.parse(localStorage.getItem("obrasPCI")) || [];
    const select = document.getElementById("filtroObra");

    obras.forEach(o => {
        const opt = document.createElement("option");
        opt.value = o.id;
        opt.textContent = o.nombre;
        select.appendChild(opt);
    });
}

function cargarUsuariosEnFiltro() {
    const select = document.getElementById("filtroUsuario");

    usuarios.forEach(u => {
        const opt = document.createElement("option");
        opt.value = u.id;
        opt.textContent = u.nombre;
        select.appendChild(opt);
    });
}

function getUsuarioById(id) {
    return usuarios.find(u => u.id === id) || null;
}

function getObraById(id) {
    const obras = JSON.parse(localStorage.getItem("obrasPCI")) || [];
    return obras.find(o => o.id === id) || null;
}

</script>

</body>
</html>
